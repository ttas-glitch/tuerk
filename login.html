<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zugang – NahostFakten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: #0a0a0a;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 380px;
    padding: 48px 40px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    text-align: center;
  }
  .lock {
    font-size: 32px;
    margin-bottom: 24px;
    opacity: 0.6;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #fafafa;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  p {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 32px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fafafa;
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }
  input[type="password"]:focus { border-color: #555; }
  button {
    width: 100%;
    padding: 12px;
    background: #fafafa;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .error {
    font-size: 0.78rem;
    color: #c0392b;
    margin-top: 12px;
    min-height: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="lock">&#128274;</div>
  <h1>Zugang erforderlich</h1>
  <p>Dieser Bereich ist passwortgeschützt.</p>
  <input type="password" id="pw" placeholder="Passwort" autofocus />
  <button onclick="check()">Einloggen</button>
  <div class="error" id="err"></div>
</div>
<script>
const HASH = '22d508fb0b7322e4ef8ef91cba397cad3ebb89a96b364cfcd10f5edfffdd0228';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function check() {
  const val = document.getElementById('pw').value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem('auth', '1');
    const params = new URLSearchParams(location.search);
    location.replace(params.get('r') || '/index.html');
  } else {
    document.getElementById('err').textContent = 'Falsches Passwort.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') check();
});
</script>
</body>
</html>
