<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<script src="/auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gespeicherte Dateien — Nahost Faktencheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #fafafa;
  --gray-100: #f4f4f4;
  --gray-200: #e8e8e8;
  --gray-400: #999;
  --gray-600: #555;
  --gray-800: #222;
  --accent: #c0392b;
  --accent-light: #fdf0ef;
  --border: #e2e2e2;
  --radius: 12px;
  --radius-lg: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--white);
  color: var(--black);
  min-height: 100vh;
  padding: 2.5rem 1rem 4rem;
}

.page-wrap {
  max-width: 780px;
  margin: 0 auto;
}

.page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.page-header h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.page-header h1 em {
  font-style: italic;
  color: var(--accent);
}

.header-actions {
  display: flex;
  gap: 0.6rem;
  align-items: center;
}

.btn-sm {
  font-family: 'Sora', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.btn-sm-outline {
  background: transparent;
  color: var(--gray-600);
  border: 1.5px solid var(--border);
}

.btn-sm-outline:hover {
  border-color: var(--black);
  color: var(--black);
}

.btn-sm-danger {
  background: transparent;
  color: var(--gray-400);
  border: 1.5px solid var(--border);
}

.btn-sm-danger:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-sm-primary {
  background: var(--black);
  color: var(--white);
  border: 1.5px solid var(--black);
}

.btn-sm-primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'Sora', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.4rem 0.85rem;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--gray-600);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn.active, .filter-btn:hover {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}

.toolbar-count {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--gray-400);
  font-weight: 500;
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 5rem 2rem;
  color: var(--gray-400);
}

.empty-state svg {
  width: 48px;
  height: 48px;
  stroke: var(--gray-200);
  margin-bottom: 1rem;
}

.empty-state p {
  font-size: 0.875rem;
  margin-bottom: 1.25rem;
}

/* ── File Grid ── */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
}

.file-card {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--white);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
  animation: cardIn 0.25s cubic-bezier(0.34, 1.4, 0.64, 1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.95) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.file-card:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.09);
  transform: translateY(-2px);
  border-color: var(--gray-400);
}

.file-card-thumb {
  width: 100%;
  aspect-ratio: 4 / 3;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.file-card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.file-card-thumb .type-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 5px;
  background: rgba(10,10,10,0.7);
  color: var(--white);
  backdrop-filter: blur(4px);
}

.file-card-thumb svg {
  width: 32px;
  height: 32px;
  stroke: var(--gray-400);
}

.file-card-body {
  padding: 0.75rem;
}

.file-card-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gray-800);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.25rem;
}

.file-card-meta {
  font-size: 0.7rem;
  color: var(--gray-400);
}

.file-card-footer {
  padding: 0 0.75rem 0.75rem;
  display: flex;
  justify-content: flex-end;
}

.btn-delete {
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px;
  color: var(--gray-400);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}

.btn-delete:hover {
  color: var(--accent);
  background: var(--accent-light);
}

/* ── List view ── */
.file-list-view {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.file-row {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  animation: cardIn 0.2s ease both;
}

.file-row-thumb {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.file-row-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.file-row-thumb svg {
  width: 18px;
  height: 18px;
  stroke: var(--gray-400);
}

.file-row-info {
  flex: 1;
  min-width: 0;
}

.file-row-name {
  font-size: 0.825rem;
  font-weight: 600;
  color: var(--gray-800);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-row-meta {
  font-size: 0.7rem;
  color: var(--gray-400);
  margin-top: 1px;
}

/* ── View toggle ── */
.view-toggle {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.view-btn {
  background: none;
  border: none;
  padding: 5px 9px;
  cursor: pointer;
  color: var(--gray-400);
  display: flex;
  align-items: center;
  transition: background 0.12s, color 0.12s;
}

.view-btn.active, .view-btn:hover {
  background: var(--black);
  color: var(--white);
}
</style>
</head>
<body>

<div class="page-wrap">

  <div class="page-header">
    <div>
      <h1>Gespeicherte <em>Dateien</em></h1>
    </div>
    <div class="header-actions">
      <a href="upload.html" class="btn-sm btn-sm-primary">↑ Hochladen</a>
      <button class="btn-sm btn-sm-danger" id="btnClearAll">Alle löschen</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="image">Bilder</button>
    <button class="filter-btn" data-filter="video">Videos</button>
    <button class="filter-btn" data-filter="other">Dokumente</button>
    <span class="toolbar-count" id="toolbarCount"></span>
    <div class="view-toggle">
      <button class="view-btn active" id="viewGrid" title="Rasteransicht">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="view-btn" id="viewList" title="Listenansicht">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="container"></div>

</div>

<script>
const WORKER_URL = 'https://tuerk-uploads.YOUR_SUBDOMAIN.workers.dev';
let currentFilter = 'all';
let viewMode = 'grid';
let cachedFiles = [];

async function load() {
  const res = await fetch(`${WORKER_URL}/`);
  if (!res.ok) throw new Error('Failed to load files');
  return res.json();
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function getCategory(type) {
  if (type.startsWith('image/')) return 'image';
  if (type.startsWith('video/')) return 'video';
  return 'other';
}

function fileIcon(type) {
  if (type.startsWith('video/')) return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>`;
  if (type === 'application/pdf') return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`;
}

function typeLabel(type) {
  if (type.startsWith('image/')) return type.split('/')[1].toUpperCase();
  if (type.startsWith('video/')) return type.split('/')[1].toUpperCase();
  if (type === 'application/pdf') return 'PDF';
  const ext = type.split('/')[1];
  return ext ? ext.split('.').pop().toUpperCase() : 'Datei';
}

async function deleteFile(key) {
  await fetch(`${WORKER_URL}/${encodeURIComponent(key)}`, { method: 'DELETE' });
  await render();
}

async function render() {
  const container = document.getElementById('container');
  container.innerHTML = `<div class="empty-state"><p style="color:var(--gray-400)">Laden…</p></div>`;

  try {
    cachedFiles = await load();
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><p>Fehler beim Laden. Worker URL prüfen.</p></div>`;
    return;
  }

  const all = cachedFiles.map(f => ({
    key: f.key,
    name: f.key,
    size: f.size,
    type: f.contentType,
    date: f.uploaded,
    url: `${WORKER_URL}/${encodeURIComponent(f.key)}`
  }));

  const filtered = currentFilter === 'all' ? all : all.filter(f => getCategory(f.type) === currentFilter);

  document.getElementById('toolbarCount').textContent =
    filtered.length + ' Datei' + (filtered.length !== 1 ? 'en' : '');

  if (all.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
        </svg>
        <p>Noch keine Dateien hochgeladen.</p>
        <a href="upload.html" class="btn-sm btn-sm-primary" style="display:inline-flex;">↑ Jetzt hochladen</a>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>Keine Dateien in dieser Kategorie.</p></div>`;
    return;
  }

  const thumbFor = f => f.type.startsWith('image/')
    ? `<img src="${f.url}" alt="${f.name}" loading="lazy">`
    : `${fileIcon(f.type)}<span class="type-badge">${typeLabel(f.type)}</span>`;

  const deleteBtn = key => `
    <button class="btn-delete" data-key="${key}" title="Löschen">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>`;

  if (viewMode === 'grid') {
    container.innerHTML = `<div class="file-grid">${filtered.map((f, i) => `
      <div class="file-card" style="animation-delay:${i * 0.04}s">
        <div class="file-card-thumb">${thumbFor(f)}</div>
        <div class="file-card-body">
          <div class="file-card-name" title="${f.name}">${f.name}</div>
          <div class="file-card-meta">${formatBytes(f.size)} · ${formatDate(f.date)}</div>
        </div>
        <div class="file-card-footer">${deleteBtn(f.key)}</div>
      </div>`).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="file-list-view">${filtered.map((f, i) => `
      <div class="file-row" style="animation-delay:${i * 0.03}s">
        <div class="file-row-thumb">${f.type.startsWith('image/') ? `<img src="${f.url}" alt="${f.name}" loading="lazy">` : fileIcon(f.type)}</div>
        <div class="file-row-info">
          <div class="file-row-name" title="${f.name}">${f.name}</div>
          <div class="file-row-meta">${formatBytes(f.size)} · ${formatDate(f.date)}</div>
        </div>
        ${deleteBtn(f.key)}
      </div>`).join('')}</div>`;
  }

  container.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteFile(btn.dataset.key));
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// View toggle
document.getElementById('viewGrid').addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('viewGrid').classList.add('active');
  document.getElementById('viewList').classList.remove('active');
  render();
});
document.getElementById('viewList').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('viewList').classList.add('active');
  document.getElementById('viewGrid').classList.remove('active');
  render();
});

// Clear all
document.getElementById('btnClearAll').addEventListener('click', async () => {
  if (!cachedFiles.length) return;
  if (confirm('Alle gespeicherten Dateien löschen?')) {
    await Promise.all(cachedFiles.map(f =>
      fetch(`${WORKER_URL}/${encodeURIComponent(f.key)}`, { method: 'DELETE' })
    ));
    await render();
  }
});

render();
</script>
</body>
</html>
